<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Login | Keira Natalie Beauty & Hair Studio</title>

  <link rel="stylesheet" href="login.css" />
</head>

<body>

  <section class="login-page">

    <div class="login-card">

      <div class="login-header">
        <p class="label">Staff Portal</p>
        <h1>Welcome Back</h1>
        <p>
          Login to access your bookings, calendar,
          and appointment dashboard.
        </p>
      </div>

      <form class="login-form">

        <label>
          Email
          <input 
            type="email" 
            placeholder="Enter your email"
            required
          />
        </label>

        <label>
          Password
          <input 
            type="password" 
            placeholder="Enter your password"
            required
          />
        </label>

        <div class="login-actions">
          <button type="submit" class="login-btn">
            Login
          </button>
        </div>

      </form>
